<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Contact - Convish CRM</title>

        tailwind.config = {

                extend: {

                        "text-primary": "#F9FAFB",
                        "inverse-primary": "#494bd6",

                        "secondary-fixed-dim": "#c0c6da",
                        "text-secondary": "#9CA3AF",
                        "surface-container-highest": "#313441",
                        "on-primary": "#1000a9",
                        "on-secondary": "#2a3040",
                        "on-background": "#dfe2f2",
                        "on-tertiary-container": "#00285d",
                        "on-secondary-fixed": "#151b2a",

                        "surface-bright": "#353945",
                        "on-secondary-fixed-variant": "#414657",
                        "border-strong": "#374151",

                        "outline": "#908fa0",
                        "background": "#0f131e",
                        "on-surface": "#dfe2f2",
                        "stage-green": "#10B981",
                        "on-error": "#690005",
                        "surface-container": "#1b1f2b",
                        "stage-violet": "#8B5CF6",

                        "surface-container-high": "#262a36",
                        "primary-fixed-dim": "#c0c1ff",

                        "secondary": "#c0c6da",
                        "on-primary-fixed": "#07006c",
                        "on-tertiary-fixed": "#001a42",
                        "inverse-surface": "#dfe2f2",
                        "surface-dim": "#0f131e",
                        "stage-slate": "#64748B",
                        "error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-text-primary font-body-md h-screen flex flex-col overflow-hidden">
<!-- Top Navigation (Mobile App Header for Flow) -->
<header class="flex justify-between items-center px-4 h-16 border-b border-border-subtle bg-surface z-50">
<button class="text-text-secondary hover:text-text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-text-primary">Add Contact</h1>
<button class="text-primary hover:text-primary-fixed transition-colors active:scale-95 font-label-sm text-label-sm">
            Save
        </button>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto p-4 pb-24">
<!-- Progress Indicator -->
<div class="flex items-center justify-between mb-8 px-2">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-background font-label-sm text-label-sm mb-2">1</div>
<span class="font-micro text-micro text-primary">Details</span>
</div>
<div class="h-[1px] flex-1 bg-primary mx-2 opacity-50"></div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full border border-border-subtle bg-surface-elevated flex items-center justify-center text-text-secondary font-label-sm text-label-sm mb-2">2</div>
<span class="font-micro text-micro text-text-secondary">Company</span>
</div>
<div class="h-[1px] flex-1 bg-border-subtle mx-2"></div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full border border-border-subtle bg-surface-elevated flex items-center justify-center text-text-secondary font-label-sm text-label-sm mb-2">3</div>
<span class="font-micro text-micro text-text-secondary">Notes</span>
</div>
</div>
<!-- Quick Add Section (AI/PDF) -->
<div class="mb-8">
<div class="bg-surface-elevated border border-border-subtle rounded-xl p-4 flex flex-col items-center justify-center border-dashed relative overflow-hidden group hover:border-primary transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
<span class="material-symbols-outlined text-4xl text-primary mb-3">document_scanner</span>
<h3 class="font-headline-sm text-headline-sm text-text-primary mb-1">Scan Business Card or PDF</h3>
<p class="font-body-md text-body-md text-text-secondary text-center mb-4">Let our AI extract the details instantly.</p>
<button class="bg-primary/10 text-primary border border-primary/20 px-4 py-2 rounded-lg font-label-sm text-label-sm flex items-center gap-2 active:scale-97 transition-all">
<span class="material-symbols-outlined text-sm">upload_file</span>
                    Upload Document
                </button>
</div>
<div class="flex items-center my-6">
<div class="h-[1px] flex-1 bg-border-subtle"></div>
<span class="px-4 font-label-sm text-label-sm text-text-secondary uppercase">or enter manually</span>
<div class="h-[1px] flex-1 bg-border-subtle"></div>
</div>
</div>
<!-- Manual Entry Form -->
<form class="space-y-4">
<!-- Photo Upload -->
<div class="flex justify-center mb-6">
<div class="relative">
<div class="w-20 h-20 rounded-full bg-surface-elevated border border-border-subtle flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-3xl text-text-secondary">person</span>
</div>
<button class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-primary text-background flex items-center justify-center border-2 border-background active:scale-95 transition-transform" type="button">
<span class="material-symbols-outlined text-sm" data-weight="fill">add_a_photo</span>
</button>
</div>
</div>
<div class="space-y-4">
<div class="flex gap-4">
<div class="flex-1">
<label class="block font-label-sm text-label-sm text-text-secondary mb-1">First Name</label>
<input class="w-full bg-surface-elevated border border-border-subtle rounded-lg px-3 py-2 text-text-primary font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" placeholder="e.g. Jane" type="text"/>
</div>
<div class="flex-1">
<label class="block font-label-sm text-label-sm text-text-secondary mb-1">Last Name</label>
<input class="w-full bg-surface-elevated border border-border-subtle rounded-lg px-3 py-2 text-text-primary font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" placeholder="e.g. Doe" type="text"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-text-secondary mb-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-secondary text-sm">mail</span>
<input class="w-full bg-surface-elevated border border-border-subtle rounded-lg pl-9 pr-3 py-2 text-text-primary font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" placeholder="jane@example.com" type="email"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-text-secondary mb-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-secondary text-sm">call</span>
<input class="w-full bg-surface-elevated border border-border-subtle rounded-lg pl-9 pr-3 py-2 text-text-primary font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-colors outline-none" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-text-secondary mb-1">Tags</label>
<div class="w-full bg-surface-elevated border border-border-subtle rounded-lg px-3 py-2 flex flex-wrap gap-2 min-h-[42px] items-center">
<span class="bg-surface-variant text-text-primary px-2 py-1 rounded text-xs font-label-sm flex items-center gap-1">
                            Prospect
                            <span class="material-symbols-outlined text-[10px] cursor-pointer hover:text-error transition-colors">close</span>
</span>
<input class="bg-transparent border-none outline-none text-text-primary font-body-md text-body-md flex-1 min-w-[100px] text-sm" placeholder="Add tag..." type="text"/>
</div>
</div>
</div>
</form>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-surface/80 backdrop-blur-md border-t border-border-subtle z-40">
<button class="w-full bg-primary text-background font-headline-sm text-headline-sm py-3 rounded-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
            Continue to Company
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</body></html>
