<body class="bg-background text-text-primary font-body-md min-h-screen flex items-center justify-center p-4">
<!-- Ambient Background Effect -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden flex justify-center items-center opacity-30">
<div class="w-[800px] h-[800px] bg-primary-container rounded-full blur-[120px] mix-blend-screen opacity-20"></div>
<div class="absolute w-[600px] h-[600px] bg-tertiary-container rounded-full blur-[100px] mix-blend-screen opacity-10 translate-x-1/4 -translate-y-1/4"></div>
</div>
<div class="relative z-10 w-full max-w-[420px] bg-surface border border-border-subtle rounded-xl shadow-2xl p-8 transition-all duration-300">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Convish</h1>
<p class="font-body-md text-body-md text-text-secondary">Elite CRM. Sign in to your account.</p>
</div>
<!-- Social Login -->
<div class="space-y-4 mb-6">
<button class="w-full flex items-center justify-center gap-3 bg-surface-elevated hover:bg-surface-bright border border-border-strong text-text-primary font-label-sm text-label-sm py-3 px-4 rounded-lg transition-colors active:scale-95 duration-200">
<!-- Simple LinkedIn Icon SVG -->
<svg fill="currentColor" height="16" viewbox="0 0 16 16" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"></path>
</svg>
                Continue with LinkedIn
            </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-6">
<div class="flex-1 h-px bg-border-subtle"></div>
<span class="font-micro text-micro text-text-muted uppercase tracking-wider">Or continue with</span>
<div class="flex-1 h-px bg-border-subtle"></div>
</div>
<!-- Form -->
<form class="space-y-4">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-text-secondary block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[18px]">mail</span>
<input class="w-full bg-surface-dim border border-border-subtle text-text-primary font-body-md text-body-md rounded-lg py-2.5 pl-10 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-text-muted" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-text-secondary" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[18px]">lock</span>
<input class="w-full bg-surface-dim border border-border-subtle text-text-primary font-body-md text-body-md rounded-lg py-2.5 pl-10 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-text-muted" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-2.5 rounded-lg mt-2 hover:bg-primary-container transition-colors active:scale-95 duration-200 shadow-[0_0_15px_rgba(192,193,255,0.15)]" type="submit">
                Sign In
            </button>
</form>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-text-secondary">
                Don't have an account? 
                <a class="text-primary hover:text-primary-container font-medium transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
</body></html>
